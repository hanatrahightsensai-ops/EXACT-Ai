<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EXACT AI</title>
<style>
  :root{
    --blue:#2E5BFF;
    --blue-dark:#1E3FCC;
    --gold:#F0B90B;
    --bg:#EEF1F8;
    --card:#FFFFFF;
    --text:#12172B;
    --muted:#6B7280;
    --line:#E5E9F5;
    --green-bg:#E9F9EF;
    --green-text:#1D8A4C;
    --red-bg:#FDEAEA;
    --red-text:#C23B3B;
    --orange-bg:#FFF3E6;
    --orange-text:#B4620A;
    --radius:22px;
    --shadow:0 10px 30px -12px rgba(46,91,255,.18);
  }
  .dark{
    --bg:#0B1020;
    --card:#141B34;
    --text:#EDF0FA;
    --muted:#9AA4C4;
    --line:#232B4C;
    --green-bg:#0F2A1C;
    --green-text:#4ADE80;
    --red-bg:#301418;
    --red-text:#FB7185;
    --orange-bg:#2E220E;
    --orange-text:#FBBF24;
    --shadow:0 10px 30px -12px rgba(0,0,0,.5);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
    background:var(--bg);
    color:var(--text);
    min-height:100vh;
    transition:background .25s,color .25s;
  }
  #app{max-width:640px;margin:0 auto;padding:20px 16px 60px;}
  .topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;gap:10px;}
  .brand{display:flex;align-items:center;gap:10px;}
  .brand-icon{
    width:46px;height:46px;border-radius:14px;background:var(--blue);
    display:flex;align-items:center;justify-content:center;position:relative;
    box-shadow:var(--shadow);
  }
  .brand-icon svg{width:26px;height:26px;}
  .brand-name{font-weight:900;font-style:italic;font-size:22px;color:var(--blue);letter-spacing:.5px;}
  .topbar-actions{display:flex;gap:8px;}
  .pill-btn{
    background:var(--card);border:1px solid var(--line);border-radius:14px;
    padding:8px 12px;font-weight:800;font-size:13px;color:var(--text);
    display:flex;align-items:center;gap:6px;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.04);
  }
  .card{
    background:var(--card);border-radius:var(--radius);padding:26px 22px;
    box-shadow:var(--shadow);margin-bottom:16px;
  }
  h1{font-size:26px;font-weight:900;text-align:center;margin:6px 0 8px;}
  .subtitle{color:var(--muted);text-align:center;font-size:14.5px;line-height:1.5;margin-bottom:22px;}
  label.field-label{
    display:block;font-size:12.5px;font-weight:800;color:var(--blue);
    letter-spacing:.06em;text-transform:uppercase;margin-bottom:8px;
  }
  input[type=text], select{
    width:100%;padding:14px 16px;border-radius:14px;border:1.5px solid var(--line);
    background:var(--bg);color:var(--text);font-size:16px;font-weight:700;margin-bottom:20px;
    appearance:none;
  }
  input[type=text]:focus, select:focus{outline:2px solid var(--blue);}
  .btn-primary{
    width:100%;background:var(--blue);color:#fff;border:none;border-radius:16px;
    padding:16px;font-size:16px;font-weight:900;letter-spacing:.03em;cursor:pointer;
    display:flex;align-items:center;justify-content:center;gap:8px;
    box-shadow:0 8px 20px -6px rgba(46,91,255,.55);
    transition:transform .12s;
  }
  .btn-primary:active{transform:scale(.98);}
  .btn-primary:disabled{opacity:.45;cursor:not-allowed;}
  .btn-ghost{
    background:transparent;border:none;color:var(--text);font-weight:800;
    display:flex;align-items:center;gap:6px;cursor:pointer;margin-bottom:14px;font-size:15px;
  }
  .goal-option{
    border:1.5px solid var(--line);border-radius:18px;padding:16px 18px;margin-bottom:12px;
    display:flex;align-items:center;justify-content:space-between;cursor:pointer;
    background:var(--card);
  }
  .goal-option .go-title{font-weight:900;font-size:16px;}
  .goal-option .go-desc{font-size:13px;color:var(--muted);margin-top:3px;}
  .goal-option.selected{border-color:var(--blue);background:color-mix(in srgb, var(--blue) 8%, var(--card));}
  .goal-option.selected .go-title{color:var(--blue);}
  .radio-circle{
    width:22px;height:22px;border-radius:50%;border:2px solid var(--line);flex:none;
    display:flex;align-items:center;justify-content:center;
  }
  .goal-option.selected .radio-circle{border-color:var(--blue);}
  .goal-option.selected .radio-circle:after{content:'';width:11px;height:11px;background:var(--blue);border-radius:50%;}
  .topic-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .topic-item{
    border:1.5px solid var(--line);border-radius:16px;padding:16px 14px;font-weight:800;
    font-size:14.5px;cursor:pointer;background:var(--bg);text-align:left;line-height:1.3;
    transition:.15s;
  }
  .topic-item:hover{border-color:var(--blue);}
  .header-band{
    background:var(--blue);border-radius:20px;padding:18px 20px;color:#fff;margin-bottom:18px;
    display:flex;align-items:center;justify-content:space-between;
  }
  .header-band .eyebrow{font-size:11px;font-weight:800;letter-spacing:.12em;opacity:.85;}
  .header-band .htitle{font-size:20px;font-weight:900;font-style:italic;margin-top:2px;}
  .q-card{
    background:var(--card);border-radius:20px;padding:18px 18px 16px;margin-bottom:14px;
    box-shadow:var(--shadow);border:1.5px solid transparent;
  }
  .q-card.correct{border-color:var(--green-text);}
  .q-card.wrong{border-color:var(--red-text);}
  .q-head{display:flex;gap:12px;align-items:flex-start;}
  .q-badge{
    background:#EAF0FF;color:var(--blue);font-weight:900;font-size:13px;border-radius:10px;
    padding:8px 10px;flex:none;
  }
  .dark .q-badge{background:#1c2650;}
  .q-text{font-weight:800;font-size:15.5px;line-height:1.5;flex:1;}
  .hint-btn{background:none;border:none;cursor:pointer;font-size:20px;flex:none;}
  .hint-box{
    background:var(--orange-bg);color:var(--orange-text);border-radius:12px;padding:10px 12px;
    font-size:13px;margin:10px 0 4px;font-weight:700;
  }
  .choice{
    border:1.5px solid var(--line);border-radius:14px;padding:12px 14px;margin-top:10px;
    display:flex;align-items:center;gap:12px;cursor:pointer;font-size:14.5px;font-weight:700;
  }
  .choice .letter{
    width:26px;height:26px;border-radius:8px;background:var(--bg);color:var(--muted);
    display:flex;align-items:center;justify-content:center;font-weight:900;font-size:13px;flex:none;
  }
  .choice.selected{border-color:var(--blue);background:color-mix(in srgb, var(--blue) 6%, var(--card));}
  .choice.selected .letter{background:var(--blue);color:#fff;}
  .choice.show-correct{border-color:var(--green-text);background:var(--green-bg);}
  .choice.show-correct .letter{background:var(--green-text);color:#fff;}
  .choice.show-wrong{border-color:var(--red-text);background:var(--red-bg);}
  .choice.show-wrong .letter{background:var(--red-text);color:#fff;}
  .explain-box{
    margin-top:12px;font-size:13px;line-height:1.5;padding:12px;border-radius:12px;
    background:var(--bg);color:var(--muted);
  }
  .progress-wrap{background:var(--line);border-radius:99px;height:8px;margin-bottom:18px;overflow:hidden;}
  .progress-bar{background:var(--blue);height:100%;border-radius:99px;transition:width .3s;}
  .sticky-submit{position:sticky;bottom:12px;margin-top:6px;}
  .result-hero{
    background:linear-gradient(135deg,var(--blue),var(--blue-dark));border-radius:22px;
    padding:34px 20px;text-align:center;color:#fff;margin-bottom:16px;box-shadow:var(--shadow);
  }
  .result-hero .trophy{font-size:40px;}
  .result-hero .score{font-size:56px;font-weight:900;margin:4px 0;}
  .result-hero .label{font-size:12px;letter-spacing:.14em;font-weight:800;opacity:.85;}
  .box-title{font-weight:900;font-size:14px;margin-bottom:12px;letter-spacing:.02em;}
  .box-green{background:var(--green-bg);border-radius:18px;padding:18px 18px;margin-bottom:14px;}
  .box-green .box-title{color:var(--green-text);}
  .box-orange{background:var(--orange-bg);border-radius:18px;padding:18px 18px;margin-bottom:14px;}
  .box-orange .box-title{color:var(--orange-text);}
  ul.result-list{margin:0;padding:0;list-style:none;}
  ul.result-list li{display:flex;gap:10px;font-size:13.5px;font-weight:700;margin-bottom:9px;line-height:1.45;}
  .box-strategy{
    background:#0B1224;color:#fff;border-radius:18px;padding:18px;margin-bottom:16px;
  }
  .box-strategy .eyebrow{font-size:11px;color:#8FA3FF;font-weight:800;letter-spacing:.1em;margin-bottom:8px;}
  .box-strategy p{font-style:italic;font-weight:700;font-size:14px;line-height:1.6;margin:0;text-decoration:underline;text-decoration-color:#3A4A8A;}
  .radar-title{font-weight:900;text-align:center;margin-bottom:12px;color:var(--muted);text-decoration:underline;}
  .bottom-actions{display:flex;gap:10px;margin-top:6px;}
  .btn-secondary{
    flex:1;background:var(--bg);color:var(--text);border:1.5px solid var(--line);border-radius:16px;
    padding:14px;font-weight:900;cursor:pointer;font-size:14.5px;
  }
  .small-note{font-size:12px;color:var(--muted);text-align:center;margin-top:10px;line-height:1.5;}
</style>
</head>

function shuffle(arr){const a=arr.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function ri(min,max){return Math.floor(min+Math.random()*(max-min+1));}
function rf(min,max,dec=1){const v=min+Math.random()*(max-min);const p=Math.pow(10,dec);return Math.round(v*p)/p;}
function pick(arr){return arr[Math.floor(Math.random()*arr.length)];}
function buildQ(text,correctText,distractors,explain,skills,level){
  const choices=shuffle([correctText,...distractors]);
  const correctIndex=choices.indexOf(correctText);
  return {text,choices,correctIndex,explain,skills,level};
}

function assembleQuiz(topicId,goalId){
  const eng=ENGINE[topicId];
  const advRatio=GOAL_MIX[goalId]!==undefined?GOAL_MIX[goalId]:0.3;
  const total=10;
  const advCount=Math.round(total*advRatio);
  const basicCount=total-advCount;
  let cBasic=shuffle(eng.conceptual.filter(c=>c.level==="basic"));
  let cAdv=shuffle(eng.conceptual.filter(c=>c.level==="advanced"));
  let out=[];
  for(let i=0;i<basicCount;i++){
    if(i%2===0 && cBasic.length) out.push(cBasic.pop());
    else out.push(eng.basicGen());
  }
  for(let i=0;i<advCount;i++){
    if(i%2===0 && cAdv.length) out.push(cAdv.pop());
    else out.push(eng.advGen());
  }
  return shuffle(out).slice(0,10);
}
/* ============ STATE ============ */
const state={screen:"welcome",lang:"th",dark:false,name:"",grade:"",goal:null,topic:null,questions:[],answers:[],submitted:false,error:""};
function tr(key){return T[state.lang][key];}
function topicLabel(t){return state.lang==="th"?t.th:t.en;}
function goalTitle(g){return state.lang==="th"?g.th_t:g.en_t;}
function goalDesc(g){return state.lang==="th"?g.th_d:g.en_d;}
function gradeLabel(g){return state.lang==="th"?g.th:g.en;}
/* ============ RENDER ============ */
function iconSvg(){return `<svg viewBox="0 0 24 24" fill="none"><rect x="3" y="6" width="14" height="2.4" rx="1.2" fill="white"/><rect x="3" y="11" width="14" height="2.4" rx="1.2" fill="white"/><rect x="3" y="16" width="10" height="2.4" rx="1.2" fill="white"/><circle cx="19" cy="12" r="3.4" fill="#F0B90B"/></svg>`;}
function topBar(showBack,onBack){
  return `<div class="topbar">
    <div style="display:flex;align-items:center;gap:10px;">
      ${showBack?`<button class="btn-ghost" onclick="${onBack}" style="margin:0;padding:6px;">‹</button>`:""}
      <div class="brand"><div class="brand-icon">${iconSvg()}</div><div class="brand-name">EXACT AI</div></div>
    </div>
    <div class="topbar-actions">
      <button class="pill-btn" onclick="toggleLang()">🌐 ${state.lang.toUpperCase()}</button>
      <button class="pill-btn" onclick="toggleDark()">${state.dark?"☀️":"🌙"}</button>
    </div>
  </div>`;
}
function renderWelcome(){
  return `${topBar(false)}
  <div class="card">
    <h1>${tr("welcomeTitle")}</h1>
    <p class="subtitle">${tr("welcomeSub")}</p>
    <label class="field-label">${tr("nickname")}</label>
    <input type="text" id="nameInput" value="${state.name}" placeholder="เช่น มาวิน...">
    <label class="field-label">${tr("grade")}</label>
    <select id="gradeInput">
      <option value="">${tr("gradePh")}</option>
      ${GRADES.map(g=>`<option value="${g.id}" ${state.grade===g.id?"selected":""}>${gradeLabel(g)}</option>`).join("")}
    </select>
    ${state.error?`<div style="color:var(--red-text);font-size:13px;font-weight:700;margin:-10px 0 14px;">${state.error}</div>`:""}
    <button class="btn-primary" onclick="goWelcomeNext()">${tr("next")} ›</button>
  </div>`;
}
function renderGoal(){
  return `${topBar(true,"state.screen='welcome';render();")}
  <div class="card">
    <div style="font-weight:900;font-size:20px;margin-bottom:18px;">${tr("goalTitle")}</div>
    ${GOALS.map(g=>`
      <div class="goal-option ${state.goal===g.id?"selected":""}" onclick="selectGoal('${g.id}')">
        <div><div class="go-title">${goalTitle(g)}</div><div class="go-desc">${goalDesc(g)}</div></div>
        <div class="radio-circle"></div>
      </div>`).join("")}
    ${state.error?`<div style="color:var(--red-text);font-size:13px;font-weight:700;margin:6px 0;">${state.error}</div>`:""}
    <button class="btn-primary" style="margin-top:8px;" onclick="goGoalNext()">${tr("next")} ›</button>
  </div>`;
}
function renderTopicPick(){
  return `${topBar(true,"state.screen='goal';render();")}
  <div class="card">
    <div style="font-weight:900;font-size:20px;margin-bottom:18px;">${tr("topicTitle")}</div>
    <div class="topic-grid">
      ${TOPICS.map(t=>`<button class="topic-item" onclick="selectTopic('${t.id}')">${topicLabel(t)}</button>`).join("")}
    </div>
  </div>`;
}
function renderQuiz(){
  const answeredCount=state.answers.filter(a=>a!==undefined&&a!==null).length;
  const topicObj=TOPICS.find(t=>t.id===state.topic);
  return `${topBar(true,"backToTopics()")}
  <div class="header-band">
    <div><div class="eyebrow">${tr("testing")}</div><div class="htitle">${topicLabel(topicObj)}</div></div>
    <div style="font-size:26px;">🖼️</div>
  </div>
  <div class="progress-wrap"><div class="progress-bar" style="width:${(answeredCount/10*100)}%;"></div></div>
  ${state.questions.map((q,i)=>renderQCard(q,i)).join("")}
  ${state.error?`<div style="color:var(--red-text);font-size:13px;font-weight:700;text-align:center;margin-bottom:10px;">${state.error}</div>`:""}
  <div class="sticky-submit">
    ${!state.submitted?
      `<button class="btn-primary" onclick="submitQuiz()">${tr("submit")}</button>`:
      `<button class="btn-primary" onclick="goToResult()">${tr("seeResult")} ›</button>`}
  </div>`;
}
function renderQCard(q,i){
  const userAns=state.answers[i];
  const showFeedback=state.submitted;
  let cardClass="q-card";
  if(showFeedback) cardClass+= userAns===q.correctIndex?" correct":" wrong";
  return `<div class="${cardClass}">
    <div class="q-head">
      <div class="q-badge">Q${i+1}</div>
      <div class="q-text">${q.text}</div>
      <button class="hint-btn" onclick="toggleHint(${i})">💡</button>
    </div>
    ${state._hints&&state._hints[i]?`<div class="hint-box">${tr("hint")}: ${q.explain}</div>`:""}
    ${q.choices.map((c,ci)=>{
      let cls="choice";
      if(!showFeedback){ if(userAns===ci) cls+=" selected"; }
      else{
        if(ci===q.correctIndex) cls+=" show-correct";
        else if(ci===userAns) cls+=" show-wrong";
      }
      return `<div class="${cls}" onclick="${showFeedback?"":`selectAnswer(${i},${ci})`}">
        <div class="letter">${String.fromCharCode(65+ci)}</div><div>${c}</div>
      </div>`;
    }).join("")}
    ${showFeedback?`<div class="explain-box">${q.explain}</div>`:""}
  </div>`;
}
function skillPercent(skillKey){
  let asked=0,correct=0;
  state.questions.forEach((q,i)=>{
    if(q.skills&&q.skills[skillKey]){
      asked++;
      if(state.answers[i]===q.correctIndex) correct++;
    }
  });
  if(asked===0) return 50;
  return Math.round(correct/asked*100);
}
function renderResult(){
  const score=state.questions.reduce((acc,q,i)=>acc+(state.answers[i]===q.correctIndex?1:0),0);
  const correctList=[],wrongList=[];
  state.questions.forEach((q,i)=>{
    const short=q.text.length>60?q.text.slice(0,60)+"...":q.text;
    if(state.answers[i]===q.correctIndex) correctList.push(short);
    else wrongList.push(short);
  });
  const physP=skillPercent("phys"),mathP=skillPercent("math"),logicP=skillPercent("logic"),accP=Math.round(score/10*100);
  const topicObj=TOPICS.find(t=>t.id===state.topic);
  const strategy = score>=8 ?
    (state.lang==="th"?`ยินดีด้วย! คุณทำคะแนนได้ดีมากในหัวข้อ ${topicLabel(topicObj)} แสดงว่าคุณมีพื้นฐานที่แน่นมาก พร้อมสำหรับการเรียนรู้ในระดับที่ซับซ้อนขึ้น`:`Great job! You scored well on ${topicLabel(topicObj)}. Your fundamentals are solid — ready for more advanced material.`) :
    score>=5 ?
    (state.lang==="th"?`คุณมีความเข้าใจพื้นฐานเรื่อง ${topicLabel(topicObj)} ในระดับหนึ่งแล้ว ลองทบทวนโจทย์ที่ผิดอีกครั้งเพื่อความแม่นยำที่มากขึ้น`:`You have a fair grasp of ${topicLabel(topicObj)}. Review the missed questions to sharpen accuracy.`) :
    (state.lang==="th"?`เรื่อง ${topicLabel(topicObj)} ยังต้องฝึกฝนเพิ่มเติม แนะนำให้กลับไปทบทวนสูตรและแนวคิดพื้นฐานก่อนลองทำแบบฝึกหัดใหม่`:`You need more practice on ${topicLabel(topicObj)}. Review core formulas before trying again.`);
  return `${topBar(true,"backToTopics()")}
  <div class="result-hero">
    <div class="trophy">🏆</div>
    <div class="score">${score}</div>
    <div class="label">${tr("transferScore")} / 10</div>
  </div>
  <div class="box-green">
    <div class="box-title">✅ ${tr("strong")}</div>
    <ul class="result-list">${correctList.length?correctList.map(c=>`<li>✔️ ${c}</li>`).join(""):`<li>${state.lang==="th"?"ยังไม่มีข้อที่ตอบถูก ลองทบทวนแล้วทำใหม่":"No correct answers yet — review and try again"}</li>`}</ul>
  </div>
  <div class="box-orange">
    <div class="box-title">⚠️ ${tr("weak")}</div>
    <ul class="result-list">${wrongList.length?wrongList.map(c=>`<li>❗ ${c}</li>`).join(""):`<li>${state.lang==="th"?"ยอดเยี่ยม! ไม่มีข้อผิดเลย":"Excellent! No mistakes"}</li>`}</ul>
  </div>
  <div class="box-strategy">
    <div class="eyebrow">✨ ${tr("strategyLabel")} ${state.name||"-"}</div>
    <p>"${strategy}"</p>
  </div>
  <div class="card">
    <div class="radar-title">${tr("radarTitle")}</div>
    ${radarSvg(physP,mathP,logicP,accP)}
  </div>
  <div class="bottom-actions">
    <button class="btn-secondary" onclick="retryQuiz()">🔄 ${tr("retry")}</button>
    <button class="btn-secondary" onclick="backToTopics()">📚 ${tr("changeTopic")}</button>
  </div>`;
}
function radarSvg(phys,math,logic,acc){
  const labels=state.lang==="th"?["ฟิสิกส์","คณิตศาสตร์","ตรรกะ","ความแม่นยำ"]:["Physics","Math","Logic","Accuracy"];
  const vals=[phys,math,logic,acc];
  const cx=150,cy=150,R=100;
  const angleFor=i=>-Math.PI/2 + i*(Math.PI*2/4);
  function pt(i,scale){const a=angleFor(i);const r=R*scale;return [cx+r*Math.cos(a),cy+r*Math.sin(a)];}
  const gridLevels=[0.25,0.5,0.75,1];
  const gridPolys=gridLevels.map(lv=>{
    const p=[0,1,2,3].map(i=>pt(i,lv).join(",")).join(" ");
    return `<polygon points="${p}" fill="none" stroke="var(--line)" stroke-width="1"/>`;
  }).join("");
  const axisLines=[0,1,2,3].map(i=>{const [x,y]=pt(i,1);return `<line x1="${cx}" y1="${cy}" x2="${x}" y2="${y}" stroke="var(--line)" stroke-width="1"/>`;}).join("");
  const dataPts=[0,1,2,3].map(i=>pt(i,vals[i]/100).join(",")).join(" ");
  const labelEls=[0,1,2,3].map(i=>{const [x,y]=pt(i,1.22);return `<text x="${x}" y="${y}" font-size="12" font-weight="700" fill="var(--muted)" text-anchor="middle">${labels[i]}</text>`;}).join("");
  return `<svg viewBox="0 0 300 300" width="100%" style="max-width:320px;display:block;margin:0 auto;">
    ${gridPolys}${axisLines}
    <polygon points="${dataPts}" fill="var(--blue)" fill-opacity="0.35" stroke="var(--blue)" stroke-width="2.5"/>
    ${labelEls}
  </svg>`;
}
function render(){
  const app=document.getElementById("app");
  document.body.classList.toggle("dark",state.dark);
  let html="";
  if(state.screen==="welcome") html=renderWelcome();
  else if(state.screen==="goal") html=renderGoal();
  else if(state.screen==="topic") html=renderTopicPick();
  else if(state.screen==="quiz") html=renderQuiz();
  else if(state.screen==="result") html=renderResult();
  app.innerHTML=html;
}
/* ============ ACTIONS ============ */
function toggleLang(){state.lang=state.lang==="th"?"en":"th";render();}
function toggleDark(){state.dark=!state.dark;render();}
function goWelcomeNext(){
  const name=document.getElementById("nameInput").value.trim();
  const grade=document.getElementById("gradeInput").value;
  if(!name){state.error=tr("needName");render();return;}
  if(!grade){state.error=tr("needGrade");render();return;}
  state.name=name;state.grade=grade;state.error="";state.screen="goal";render();
}
function selectGoal(id){state.goal=id;state.error="";render();}
function goGoalNext(){
  if(!state.goal){state.error=tr("needGoal");render();return;}
  state.error="";state.screen="topic";render();
}
function selectTopic(id){
  state.topic=id;
  state.questions=assembleQuiz(id,state.goal);
  state.answers=new Array(state.questions.length).fill(null);
  state.submitted=false;
  state._hints={};
  state.error="";
  state.screen="quiz";
  render();
}
function toggleHint(i){state._hints=state._hints||{};state._hints[i]=!state._hints[i];render();}
function selectAnswer(qi,ci){if(state.submitted)return;state.answers[qi]=ci;state.error="";render();}
function submitQuiz(){
  if(state.answers.some(a=>a===null||a===undefined)){state.error=tr("needAnswer");render();return;}
  state.submitted=true;state.error="";render();
  window.scrollTo({top:0,behavior:"smooth"});
}
function goToResult(){state.screen="result";render();window.scrollTo({top:0,behavior:"smooth"});}
function retryQuiz(){
  state.questions=assembleQuiz(state.topic,state.goal);
  state.answers=new Array(state.questions.length).fill(null);
  state.submitted=false;state._hints={};state.error="";
  state.screen="quiz";render();window.scrollTo({top:0,behavior:"smooth"});
}
function backToTopics(){state.screen="topic";render();window.scrollTo({top:0,behavior:"smooth"});}
render();
</script>
</body>
</html>
